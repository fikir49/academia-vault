name: academia_vault
description: "A Smart Academic Knowledge Engine."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  encrypt: ^5.0.3
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  local_auth: ^2.3.0
  hive_flutter: ^1.1.0
  google_generative_ai: ^0.4.7
  syncfusion_flutter_pdf: ^26.1.35
  open_filex: ^4.5.0
  archive: ^3.6.1
  http: ^1.6.0
  image: ^4.2.0
  nsd: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1


flutter:
  uses-material-design: true
  assets:
    - assets/images/app_logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
